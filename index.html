<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Calendar To-Do</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #ffffff;
    --card-border: #e7e5df;
    --text: #2b2a26;
    --text-faint: #a19d92;
    --ink: #0f5257;
    --ink-soft: #e6efee;
    --danger: #b8503f;
    --danger-soft: #f7e9e5;
    --warn: #b4842f;
    --warn-soft: #f5efe0;
    --safe: #6f7d6a;
    --safe-soft: #eef1ea;
    --row-hover: #f8f7f4;
    --paper: #fafaf8;
    --font-ui: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --font-mono: 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:transparent;}
  body{ font-family: var(--font-ui); color: var(--text); -webkit-font-smoothing: antialiased; }
  .card{
    max-width: 460px;
    margin: 0 auto;
    background: var(--bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 20px 20px 16px;
  }
  .eyebrow{
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    color: var(--ink);
    text-transform: uppercase;
    margin: 0 0 4px;
  }
  .now-bar{
    display:flex;
    align-items:center;
    gap: 6px;
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--card-border);
  }
  .now-dot{
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--danger);
    animation: pulse 2s ease-in-out infinite;
    flex: 0 0 auto;
  }
  @keyframes pulse{
    0%, 100%{ opacity: 1; }
    50%{ opacity: .35; }
  }
  .now-text{
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text);
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .now-text .now-time{ color: var(--ink); }

  /* ---- Calendar ---- */
  .cal-nav{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom: 10px;
  }
  .cal-title{ font-size: 15px; font-weight: 700; }
  .cal-btn{
    border:none; background:none; cursor:pointer;
    color: var(--text-faint);
    font-size: 15px;
    width: 26px; height: 26px;
    border-radius: 6px;
    transition: background .12s ease, color .12s ease;
  }
  .cal-btn:hover{ background: var(--row-hover); color: var(--ink); }
  .weekdays{
    display:grid;
    grid-template-columns: repeat(7, 1fr);
    text-align:center;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-faint);
    margin-bottom: 4px;
  }
  .days-grid{
    display:grid;
    grid-template-columns: repeat(7, 1fr);
    grid-auto-rows: min-content;
    gap: 4px;
  }
  .day-cell{
    min-height: 46px;
    display:flex;
    flex-direction:column;
    align-items:stretch;
    padding: 5px 3px 6px;
    gap: 3px;
    border-radius: 7px;
    font-size: 12px;
    cursor: pointer;
    position: relative;
    transition: background .12s ease, color .12s ease;
  }
  .day-cell .day-num{ text-align: center; }
  .day-cell.other-month{ color: #d8d5cc; cursor: default; }
  .day-cell.current-month:hover{ background: var(--row-hover); }
  .day-cell.today .day-num{
    display:inline-flex; align-items:center; justify-content:center;
    width: 17px; height: 17px; border-radius: 50%;
    border: 1.5px solid var(--ink);
    font-weight: 700;
    margin: 0 auto;
  }
  .day-cell.selected{ background: var(--ink-soft); }
  .day-cell.selected .day-num{ color: var(--ink); font-weight: 700; }
  .day-chip{
    font-family: var(--font-mono);
    font-size: 9.5px;
    font-weight: 600;
    padding: 2px 5px;
    border-radius: 4px;
    white-space: normal;
    word-break: break-word;
    line-height: 1.35;
    text-align: left;
  }
  .day-chip.safe{ color: var(--safe); background: var(--safe-soft); }
  .day-chip.warn{ color: var(--warn); background: var(--warn-soft); }
  .day-chip.danger{ color: var(--danger); background: var(--danger-soft); }

  /* ---- Selected day panel ---- */
  .selected-panel{
    margin-top: 14px;
    padding: 12px;
    background: var(--paper);
    border: 1px solid var(--card-border);
    border-radius: 9px;
  }
  .selected-label{
    font-size: 12.5px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .add-row{
    display:flex;
    gap: 6px;
    margin-bottom: 6px;
  }
  .add-row input{
    flex:1;
    min-width:0;
    border: 1px solid var(--card-border);
    border-radius: 7px;
    padding: 7px 9px;
    font-size: 13px;
    font-family: var(--font-ui);
    outline: none;
    background: #fff;
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  .add-row input:focus{ border-color: var(--ink); box-shadow: 0 0 0 3px var(--ink-soft); }
  .add-row button{
    border:none;
    background: var(--ink);
    color: #fff;
    font-weight: 600;
    font-size: 12.5px;
    padding: 0 14px;
    border-radius: 7px;
    cursor: pointer;
  }
  .add-row button:hover{ opacity: .9; }
  .mini-list{ list-style:none; margin:0; padding:0; }
  .mini-list li{
    display:flex; align-items:center; gap:8px;
    padding: 5px 2px;
    font-size: 12.5px;
  }
  .mini-list .mini-text{ flex:1; }
  .mini-list .mini-del{
    border:none; background:none; cursor:pointer;
    color: var(--text-faint); font-size: 13px;
  }
  .mini-list .mini-del:hover{ color: var(--danger); }
  .mini-empty{ font-size: 12px; color: var(--text-faint); padding: 2px 2px 4px; }

  /* ---- Todo list ---- */
  .todo-section{ margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--card-border); }
  .todo-header{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom: 10px; }
  .todo-header h2{ font-size: 13.5px; font-weight: 700; margin: 0; letter-spacing: -0.01em; }
  .todo-header .count{ font-family: var(--font-mono); font-size: 11.5px; color: var(--text-faint); }
  ul.list{ list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:3px; }
  li.task{
    display:flex; align-items:center; gap: 11px;
    padding: 9px 9px 9px 11px;
    border-radius: 7px;
    border-left: 3px solid transparent;
    transition: background .12s ease;
    animation: rise .18s ease;
  }
  @keyframes rise{ from{opacity:0; transform:translateY(3px);} to{opacity:1; transform:translateY(0);} }
  li.task:hover{ background: var(--row-hover); }
  li.task.edge-danger{ border-left-color: var(--danger); }
  li.task.edge-warn{ border-left-color: var(--warn); }
  li.task.edge-safe{ border-left-color: #d7dcd4; }
  .checkbox{
    flex:0 0 auto; width:16px; height:16px; border-radius:5px;
    border: 1.5px solid #cdc9bd; cursor:pointer; position:relative; background:#fff;
    transition: background .15s ease, border-color .15s ease;
  }
  .checkbox.checked{ background: var(--ink); border-color: var(--ink); }
  .checkbox.checked::after{
    content:""; position:absolute; left:4.5px; top:1px;
    width:4px; height:7px;
    border-right:2px solid #fff; border-bottom:2px solid #fff;
    transform: rotate(40deg);
  }
  .task-date{ flex:0 0 auto; font-family: var(--font-mono); font-size: 10.5px; color: var(--text-faint); width: 36px; }
  .task-text{ flex:1; min-width:0; font-size:13px; line-height:1.4; overflow-wrap: anywhere; }
  .task.done .task-text{ color: var(--text-faint); text-decoration: line-through; }
  .dday{
    flex:0 0 auto; font-family: var(--font-mono); font-size: 10.5px; font-weight:700;
    padding: 3px 7px; border-radius: 20px; white-space: nowrap;
  }
  .dday.safe{ color: var(--safe); background: var(--safe-soft); }
  .dday.warn{ color: var(--warn); background: var(--warn-soft); }
  .dday.danger{ color: var(--danger); background: var(--danger-soft); }
  .dday.stamp{ border: 1.5px solid var(--danger); background:#fff; transform: rotate(-3deg); }
  .del-btn{
    flex:0 0 auto; width:18px; height:18px; border:none; background:none; cursor:pointer;
    color: var(--text-faint); font-size:14px; line-height:1; opacity:0;
    transition: opacity .12s ease, color .12s ease;
  }
  li.task:hover .del-btn{ opacity:1; }
  .del-btn:hover{ color: var(--danger); }
  .empty{ text-align:center; color: var(--text-faint); font-size:12.5px; padding: 18px 0 6px; }
</style>
</head>
<body>
<div class="card">
  <div class="now-bar">
    <span class="now-dot"></span>
    <span class="now-text" id="nowText"></span>
  </div>
  <p class="eyebrow">CALENDAR</p>
  <div class="cal-nav">
    <button class="cal-btn" id="prevMonth">◀</button>
    <span class="cal-title" id="calTitle"></span>
    <button class="cal-btn" id="nextMonth">▶</button>
  </div>
  <div class="weekdays">
    <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
  </div>
  <div class="days-grid" id="daysGrid"></div>

  <div class="selected-panel" id="selectedPanel" style="display:none;">
    <div class="selected-label" id="selectedLabel"></div>
    <div class="add-row">
      <input id="dayTaskInput" type="text" placeholder="이 날짜에 할 일 입력" />
      <button id="dayAddBtn">추가</button>
    </div>
    <ul class="mini-list" id="miniList"></ul>
  </div>

  <div class="todo-section">
    <div class="todo-header">
      <h2>업무 데드라인 (D-7 이내)</h2>
      <span class="count" id="count">0개</span>
    </div>
    <ul class="list" id="list"></ul>
    <div class="empty" id="emptyMsg" style="display:none;">D-7 이내로 예정된 일정이 없어요.</div>
  </div>
</div>

<script>
const STORAGE_KEY = 'calendar_todo_v1';
let tasks = []; // {id, date:'YYYY-MM-DD', text, done}
let viewDate = new Date();      // month currently shown
let selectedDateStr = null;     // 'YYYY-MM-DD'

function pad(n){ return String(n).padStart(2,'0'); }
function toDateStr(y,m,d){ return `${y}-${pad(m+1)}-${pad(d)}`; }
function todayStr(){ const t=new Date(); return toDateStr(t.getFullYear(), t.getMonth(), t.getDate()); }

async function loadTasks(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    tasks = raw ? JSON.parse(raw) : [];
  }catch(e){ tasks = []; }
  renderAll();
}
async function saveTasks(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); }
  catch(e){ console.error('저장 실패', e); }
}

function ddayInfo(dateStr){
  const [y,m,d] = dateStr.split('-').map(Number);
  const target = new Date(y, m-1, d);
  const today = new Date(); today.setHours(0,0,0,0);
  target.setHours(0,0,0,0);
  const diff = Math.round((target-today)/86400000);
  let label, cls;
  if(diff===0) label='D-DAY';
  else if(diff>0) label='D-'+diff;
  else label='D+'+Math.abs(diff);
  if(diff<=1) cls='danger'; else if(diff<=3) cls='warn'; else cls='safe';
  return {label, cls, sortKey: diff};
}

function renderCalendar(){
  const y = viewDate.getFullYear();
  const m = viewDate.getMonth();
  document.getElementById('calTitle').textContent = `${y}년 ${m+1}월`;

  const grid = document.getElementById('daysGrid');
  grid.innerHTML = '';

  const firstDay = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const daysInPrevMonth = new Date(y, m, 0).getDate();
  const today = todayStr();

  const cellsBefore = firstDay;
  const totalCells = Math.ceil((cellsBefore + daysInMonth)/7)*7;

  for(let i=0; i<totalCells; i++){
    const cell = document.createElement('div');
    let dateStr, dayNum, inMonth;

    if(i < cellsBefore){
      dayNum = daysInPrevMonth - cellsBefore + i + 1;
      const pm = m===0 ? 11 : m-1;
      const py = m===0 ? y-1 : y;
      dateStr = toDateStr(py, pm, dayNum);
      inMonth = false;
    } else if(i >= cellsBefore + daysInMonth){
      dayNum = i - cellsBefore - daysInMonth + 1;
      const nm = m===11 ? 0 : m+1;
      const ny = m===11 ? y+1 : y;
      dateStr = toDateStr(ny, nm, dayNum);
      inMonth = false;
    } else {
      dayNum = i - cellsBefore + 1;
      dateStr = toDateStr(y, m, dayNum);
      inMonth = true;
    }

    cell.className = 'day-cell ' + (inMonth ? 'current-month' : 'other-month');
    if(inMonth && dateStr === today) cell.classList.add('today');
    if(inMonth && dateStr === selectedDateStr) cell.classList.add('selected');

    const num = document.createElement('span');
    num.className = 'day-num';
    num.textContent = dayNum;
    cell.appendChild(num);

    const dayTasks = tasks.filter(t => t.date === dateStr && !t.done)
      .sort((a,b) => ddayInfo(a.date).sortKey - ddayInfo(b.date).sortKey);
    dayTasks.forEach(task => {
      const info = ddayInfo(task.date);
      const chip = document.createElement('div');
      chip.className = 'day-chip ' + info.cls;
      chip.textContent = task.text;
      cell.appendChild(chip);
    });

    if(inMonth){
      cell.addEventListener('click', () => selectDay(dateStr));
    }
    grid.appendChild(cell);
  }
}

function selectDay(dateStr){
  selectedDateStr = dateStr;
  renderCalendar();
  renderSelectedPanel();
}

function renderSelectedPanel(){
  const panel = document.getElementById('selectedPanel');
  if(!selectedDateStr){ panel.style.display = 'none'; return; }
  panel.style.display = 'block';

  const [y,m,d] = selectedDateStr.split('-').map(Number);
  const weekday = ['일','월','화','수','목','금','토'][new Date(y,m-1,d).getDay()];
  document.getElementById('selectedLabel').textContent = `${m}월 ${d}일 (${weekday})`;

  const miniList = document.getElementById('miniList');
  miniList.innerHTML = '';
  const dayTasks = tasks.filter(t => t.date === selectedDateStr);

  if(dayTasks.length === 0){
    const p = document.createElement('div');
    p.className = 'mini-empty';
    p.textContent = '아직 등록된 일정이 없어요.';
    miniList.appendChild(p);
  } else {
    dayTasks.forEach(t => {
      const li = document.createElement('li');
      const span = document.createElement('span');
      span.className = 'mini-text';
      span.textContent = t.text;
      if(t.done) span.style.textDecoration = 'line-through';
      const del = document.createElement('button');
      del.className = 'mini-del';
      del.textContent = '✕';
      del.onclick = () => deleteTask(t.id);
      li.appendChild(span);
      li.appendChild(del);
      miniList.appendChild(li);
    });
  }
}

function addTaskToSelectedDay(){
  const input = document.getElementById('dayTaskInput');
  const text = input.value.trim();
  if(!text || !selectedDateStr) return;
  tasks.push({
    id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
    date: selectedDateStr,
    text,
    done: false
  });
  input.value = '';
  saveTasks();
  renderAll();
}

function toggleTask(id){
  const t = tasks.find(t => t.id === id);
  if(t){ t.done = !t.done; saveTasks(); renderAll(); }
}

function deleteTask(id){
  tasks = tasks.filter(t => t.id !== id);
  saveTasks();
  renderAll();
}

function renderTodoList(){
  const list = document.getElementById('list');
  const emptyMsg = document.getElementById('emptyMsg');
  const count = document.getElementById('count');

  const active = tasks.filter(t => !t.done);
  const done = tasks.filter(t => t.done);

  const withInfo = arr => arr.map(t => ({t, info: ddayInfo(t.date)}));
  const activeSorted = withInfo(active)
    .filter(item => item.info.sortKey <= 7)
    .sort((a,b) => a.info.sortKey - b.info.sortKey);
  const doneSorted = withInfo(done).sort((a,b) => a.info.sortKey - b.info.sortKey);

  count.textContent = activeSorted.length + '개';
  list.innerHTML = '';

  if(activeSorted.length === 0 && doneSorted.length === 0){ emptyMsg.style.display = 'block'; return; }
  emptyMsg.style.display = 'none';

  const renderRow = ({t, info}) => {
    const li = document.createElement('li');
    li.className = 'task edge-' + info.cls + (t.done ? ' done' : '');

    const cb = document.createElement('div');
    cb.className = 'checkbox' + (t.done ? ' checked' : '');
    cb.onclick = () => toggleTask(t.id);

    const dateSpan = document.createElement('span');
    dateSpan.className = 'task-date';
    const [,mo,da] = t.date.split('-');
    dateSpan.textContent = `${+mo}/${+da}`;

    const span = document.createElement('span');
    span.className = 'task-text';
    span.textContent = t.text;

    const badge = document.createElement('span');
    badge.className = 'dday ' + info.cls + (info.label==='D-DAY' && !t.done ? ' stamp' : '');
    badge.textContent = info.label;

    const del = document.createElement('button');
    del.className = 'del-btn';
    del.textContent = '✕';
    del.onclick = () => deleteTask(t.id);

    li.appendChild(cb);
    li.appendChild(dateSpan);
    li.appendChild(span);
    li.appendChild(badge);
    li.appendChild(del);
    return li;
  };

  activeSorted.forEach(item => list.appendChild(renderRow(item)));
  doneSorted.forEach(item => list.appendChild(renderRow(item)));
}

function renderAll(){
  renderCalendar();
  renderSelectedPanel();
  renderTodoList();
}

function updateNowText(){
  const now = new Date();
  const weekday = ['일','월','화','수','목','금','토'][now.getDay()];
  const y = now.getFullYear();
  const m = now.getMonth()+1;
  const d = now.getDate();
  const hh = pad(now.getHours());
  const mm = pad(now.getMinutes());
  const el = document.getElementById('nowText');
  if(el){
    el.innerHTML = `${y}년 ${m}월 ${d}일 (${weekday}) <span class="now-time">${hh}:${mm}</span>`;
  }
}
updateNowText();
setInterval(updateNowText, 1000 * 15);

document.getElementById('prevMonth').addEventListener('click', () => {
  viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth()-1, 1);
  renderCalendar();
});
document.getElementById('nextMonth').addEventListener('click', () => {
  viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth()+1, 1);
  renderCalendar();
});
document.getElementById('dayAddBtn').addEventListener('click', addTaskToSelectedDay);
document.getElementById('dayTaskInput').addEventListener('keydown', (e) => {
  if(e.key === 'Enter') addTaskToSelectedDay();
});

loadTasks();
</script>
</body>
</html>
