<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Deadline To-Do</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #ffffff;
    --card-border: #e7e5df;
    --text: #2b2a26;
    --text-faint: #a19d92;
    --ink: #0f5257;
    --ink-soft: #e6efee;
    --danger: #b8503f;
    --danger-soft: #f7e9e5;
    --warn: #b4842f;
    --warn-soft: #f5efe0;
    --safe: #6f7d6a;
    --safe-soft: #eef1ea;
    --row-hover: #f8f7f4;
    --paper: #fafaf8;
    --font-ui: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --font-mono: 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:transparent;}
  body{
    font-family: var(--font-ui);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  .card{
    max-width: 480px;
    margin: 0 auto;
    background: var(--bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 22px 22px 14px;
  }
  .eyebrow{
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    color: var(--ink);
    text-transform: uppercase;
    margin: 0 0 4px;
  }
  .header{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom: 18px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--card-border);
  }
  .header h1{
    font-size: 16px;
    font-weight: 700;
    margin: 0;
    letter-spacing: -0.01em;
  }
  .header .count{
    font-family: var(--font-mono);
    font-size: 11.5px;
    color: var(--text-faint);
  }
  .input-row{
    display:flex;
    gap:8px;
    margin-bottom: 8px;
  }
  .input-row input{
    flex:1;
    min-width:0;
    border: 1px solid var(--card-border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 13.5px;
    font-family: var(--font-ui);
    outline: none;
    background: var(--paper);
    transition: border-color .15s ease, background .15s ease, box-shadow .15s ease;
  }
  .input-row input:focus{
    border-color: var(--ink);
    background: #fff;
    box-shadow: 0 0 0 3px var(--ink-soft);
  }
  .input-row button{
    border: none;
    background: var(--ink);
    color: #fdfdfc;
    font-family: var(--font-ui);
    font-weight: 600;
    font-size: 13px;
    padding: 0 18px;
    border-radius: 8px;
    cursor: pointer;
    transition: opacity .15s ease, transform .1s ease;
  }
  .input-row button:hover{ opacity: .9; }
  .input-row button:active{ transform: scale(.97); }
  .hint{
    font-size: 11px;
    color: var(--text-faint);
    margin: 0 0 16px 2px;
    line-height: 1.5;
  }
  ul.list{
    list-style:none;
    margin:0; padding:0;
    display:flex;
    flex-direction:column;
    gap: 3px;
  }
  li.task{
    display:flex;
    align-items:center;
    gap: 11px;
    padding: 10px 10px 10px 12px;
    border-radius: 7px;
    border-left: 3px solid transparent;
    transition: background .12s ease, border-color .12s ease;
    animation: rise .18s ease;
  }
  @keyframes rise{
    from{ opacity: 0; transform: translateY(3px); }
    to{ opacity: 1; transform: translateY(0); }
  }
  li.task:hover{ background: var(--row-hover); }
  li.task.edge-danger{ border-left-color: var(--danger); }
  li.task.edge-warn{ border-left-color: var(--warn); }
  li.task.edge-safe{ border-left-color: #d7dcd4; }
  li.task.edge-none{ border-left-color: transparent; }
  li.task.done{ border-left-color: transparent; }
  .checkbox{
    flex: 0 0 auto;
    width: 17px; height: 17px;
    border-radius: 5px;
    border: 1.5px solid #cdc9bd;
    cursor: pointer;
    position: relative;
    background: #fff;
    transition: background .15s ease, border-color .15s ease;
  }
  .checkbox.checked{
    background: var(--ink);
    border-color: var(--ink);
  }
  .checkbox.checked::after{
    content:"";
    position:absolute;
    left:5px; top:1.5px;
    width:4px; height:8px;
    border-right:2px solid #fff;
    border-bottom:2px solid #fff;
    transform: rotate(40deg);
  }
  .task-text{
    flex:1;
    min-width:0;
    font-size: 13.5px;
    line-height:1.45;
    overflow-wrap: anywhere;
  }
  .task.done .task-text{
    color: var(--text-faint);
    text-decoration: line-through;
  }
  .dday{
    flex:0 0 auto;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .dday.safe{ color: var(--safe); background: var(--safe-soft); }
  .dday.warn{ color: var(--warn); background: var(--warn-soft); }
  .dday.danger{ color: var(--danger); background: var(--danger-soft); }
  .dday.none{ color: var(--text-faint); background: #f1f0eb; }
  .dday.stamp{
    border: 1.5px solid var(--danger);
    background: #fff;
    transform: rotate(-3deg);
    letter-spacing: 0.03em;
  }
  .del-btn{
    flex: 0 0 auto;
    width: 20px; height:20px;
    border:none; background:none;
    cursor:pointer;
    color: var(--text-faint);
    font-size: 15px;
    line-height:1;
    opacity: 0;
    transition: opacity .12s ease, color .12s ease;
  }
  li.task:hover .del-btn{ opacity: 1; }
  .del-btn:hover{ color: var(--danger); }
  .empty{
    text-align:center;
    color: var(--text-faint);
    font-size: 12.5px;
    padding: 28px 0 12px;
  }
  .divider{
    height:1px;
    background: var(--card-border);
    margin: 12px 0 8px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="header" style="flex-direction:column; align-items:stretch; gap:2px;">
    <p class="eyebrow">DEADLINE TRACKER</p>
    <div style="display:flex; align-items:baseline; justify-content:space-between;">
      <h1>업무 데드라인</h1>
      <span class="count" id="count">0개</span>
    </div>
  </div>
  <div class="input-row">
    <input id="taskInput" type="text" placeholder="예: 12일 스시로 8월 SNS 기획안" />
    <button id="addBtn">추가</button>
  </div>
  <div class="hint">날짜는 "12일", "7월12일", "7/12", "2026-07-12" 형식으로 앞에 적어주세요. 날짜가 없으면 미정으로 맨 아래에 표시돼요.</div>
  <ul class="list" id="list"></ul>
  <div class="empty" id="emptyMsg" style="display:none;">아직 할 일이 없어요. 위에서 추가해보세요.</div>
</div>

<script>
const STORAGE_KEY = 'deadline_todo_tasks';
let tasks = [];

function parseDeadline(raw){
  const text = raw.trim();
  const now = new Date();
  const currentYear = now.getFullYear();

  let m;

  // yyyy-mm-dd or yyyy.mm.dd or yyyy/mm/dd
  m = text.match(/^(\d{4})[-.\/](\d{1,2})[-.\/](\d{1,2})\s*/);
  if(m){
    const d = new Date(+m[1], +m[2]-1, +m[3]);
    return { date: d, rest: text.slice(m[0].length).trim() };
  }

  // n월 n일
  m = text.match(/^(\d{1,2})월\s*(\d{1,2})일\s*/);
  if(m){
    let year = currentYear;
    let d = new Date(year, +m[1]-1, +m[2]);
    return { date: d, rest: text.slice(m[0].length).trim() };
  }

  // m/d
  m = text.match(/^(\d{1,2})\/(\d{1,2})\s*/);
  if(m){
    let d = new Date(currentYear, +m[1]-1, +m[2]);
    return { date: d, rest: text.slice(m[0].length).trim() };
  }

  // n일 only -> assume current month, roll to next month if already passed
  m = text.match(/^(\d{1,2})일\s*/);
  if(m){
    let day = +m[1];
    let d = new Date(currentYear, now.getMonth(), day);
    const today0 = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    if(d < today0){
      d = new Date(currentYear, now.getMonth()+1, day);
    }
    return { date: d, rest: text.slice(m[0].length).trim() };
  }

  return { date: null, rest: text };
}

function ddayInfo(date){
  if(!date) return { label: '미정', cls: 'none', sortKey: Infinity };
  const today0 = new Date();
  today0.setHours(0,0,0,0);
  const target = new Date(date);
  target.setHours(0,0,0,0);
  const diff = Math.round((target - today0) / 86400000);
  let label, cls;
  if(diff === 0){ label = 'D-DAY'; }
  else if(diff > 0){ label = 'D-' + diff; }
  else { label = 'D+' + Math.abs(diff); }

  if(diff <= 1) cls = 'danger';
  else if(diff <= 3) cls = 'warn';
  else cls = 'safe';

  return { label, cls, sortKey: diff };
}

async function loadTasks(){
  try{
    const res = await window.storage.get(STORAGE_KEY);
    tasks = res ? JSON.parse(res.value) : [];
  }catch(e){
    tasks = [];
  }
  render();
}

async function saveTasks(){
  try{
    await window.storage.set(STORAGE_KEY, JSON.stringify(tasks));
  }catch(e){
    console.error('저장 실패', e);
  }
}

function addTask(){
  const input = document.getElementById('taskInput');
  const raw = input.value.trim();
  if(!raw) return;
  const { date, rest } = parseDeadline(raw);
  tasks.push({
    id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
    text: rest || raw,
    date: date ? date.toISOString() : null,
    done: false
  });
  input.value = '';
  saveTasks();
  render();
}

function toggleTask(id){
  const t = tasks.find(t => t.id === id);
  if(t){ t.done = !t.done; saveTasks(); render(); }
}

function deleteTask(id){
  tasks = tasks.filter(t => t.id !== id);
  saveTasks();
  render();
}

function render(){
  const list = document.getElementById('list');
  const emptyMsg = document.getElementById('emptyMsg');
  const count = document.getElementById('count');

  const active = tasks.filter(t => !t.done);
  const done = tasks.filter(t => t.done);

  const withKey = arr => arr.map(t => ({ t, info: ddayInfo(t.date ? new Date(t.date) : null) }));

  const activeSorted = withKey(active).sort((a,b) => a.info.sortKey - b.info.sortKey);
  const doneSorted = withKey(done).sort((a,b) => a.info.sortKey - b.info.sortKey);

  count.textContent = active.length + '개';

  list.innerHTML = '';

  if(tasks.length === 0){
    emptyMsg.style.display = 'block';
    return;
  }
  emptyMsg.style.display = 'none';

  const renderRow = ({t, info}) => {
    const li = document.createElement('li');
    li.className = 'task edge-' + info.cls + (t.done ? ' done' : '');

    const cb = document.createElement('div');
    cb.className = 'checkbox' + (t.done ? ' checked' : '');
    cb.onclick = () => toggleTask(t.id);

    const span = document.createElement('span');
    span.className = 'task-text';
    span.textContent = t.text;

    const badge = document.createElement('span');
    badge.className = 'dday ' + info.cls + (info.label === 'D-DAY' && !t.done ? ' stamp' : '');
    badge.textContent = info.label;

    const del = document.createElement('button');
    del.className = 'del-btn';
    del.textContent = '✕';
    del.onclick = () => deleteTask(t.id);

    li.appendChild(cb);
    li.appendChild(span);
    li.appendChild(badge);
    li.appendChild(del);
    return li;
  };

  activeSorted.forEach(item => list.appendChild(renderRow(item)));

  if(doneSorted.length > 0 && activeSorted.length > 0){
    const divider = document.createElement('div');
    divider.className = 'divider';
    list.appendChild(divider);
  }
  doneSorted.forEach(item => list.appendChild(renderRow(item)));
}

document.getElementById('addBtn').addEventListener('click', addTask);
document.getElementById('taskInput').addEventListener('keydown', (e) => {
  if(e.key === 'Enter') addTask();
});

loadTasks();
</script>
</body>
</html>
